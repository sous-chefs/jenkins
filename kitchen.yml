driver:
  name: vagrant
  customize:
    cpus: 2
    memory: 1024
  network:
    # Allow access to the Jenkins webui which is useful when troubleshooting
    - - forwarded_port
      - guest: 8080
        host: 9090
        auto_correct: true

provisioner:
  name: chef_infra
  data_path: test/fixtures/keys
  data_bags_path: test/fixtures/data_bags
  deprecations_as_errors: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-22.04
  - name: ubuntu-24.04

verifier:
  name: inspec

x-run_lists:
  default: &default_run_list
    - test::default
  auth_credential_file: &auth_credential_file_run_list
    - test::authentication_credential_file
  auth_username_password: &auth_username_password_run_list
    - test::authentication_username_password

x-verifiers:
  secure_controller: &secure_controller_verifier
    inspec_tests:
      - path: test/integration/authentication
  credential_file: &credential_file_verifier
    inspec_tests:
      - path: test/integration/authentication_credential_file
  username_password: &username_password_verifier
    inspec_tests:
      - path: test/integration/authentication_username_password

suites:
  - name: default
    run_list: *default_run_list
    verifier: *secure_controller_verifier

  - name: authentication_credential_file
    run_list: *auth_credential_file_run_list
    verifier: *credential_file_verifier

  - name: authentication_username_password
    run_list: *auth_username_password_run_list
    verifier: *username_password_verifier
